<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head  xmlns:th="http://www.thymeleaf.org">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        :root {
            --bg-body:       #dceef8;
            --bg-card:       #ffffff;
            --bg-sidebar:    #1a6fa8;
            --color-text:    #1a3a52;
            --color-sub:     #5a8fa8;
            --color-border:  #b3d6ee;
            --color-divider: #d0e9f5;
            --color-card-bdr:#c5dff0;
            --color-dd-bg:   #ffffff;
            --color-dd-hov:  #e8f4fd;
            --color-dd-bdr:  #c5dff0;
            --color-dd-item: #1a3a52;
            --transition: 0.25s ease;
        }
        [data-theme="dark"] {
            --bg-body:       #0f1e2b;
            --bg-card:       #162534;
            --bg-sidebar:    #0e3f60;
            --color-text:    #d0e8f5;
            --color-sub:     #5a8fa8;
            --color-border:  #2a4f6a;
            --color-divider: #1e3d55;
            --color-card-bdr:#1e3d55;
            --color-dd-bg:   #162534;
            --color-dd-hov:  #1c3448;
            --color-dd-bdr:  #2a4f6a;
            --color-dd-item: #c0ddf0;
        }
        * { box-sizing: border-box; transition: background-color var(--transition), color var(--transition), border-color var(--transition); }
        body {
            background-color: var(--bg-body);
            font-family: 'Segoe UI', sans-serif;
            color: var(--color-text);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: #1a6fa8 !important;
            box-shadow: 0 2px 10px rgba(26,111,168,0.3);
            padding: 0;
        }
        [data-theme="dark"] .navbar { background: #0e3f60 !important; }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 20px; font-weight: 700;
            color: #fff !important; letter-spacing: -0.3px;
        }
        .navbar-brand .logo-icon {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.18);
            border-radius: 8px; display: flex;
            align-items: center; justify-content: center;
        }
        .navbar-brand span { color: #a8dcf5; }
        .navbar-nav .nav-link {
            color: rgba(255,255,255,0.88) !important;
            font-size: 14px; font-weight: 500;
            padding: 20px 14px !important;
            border-bottom: 2px solid transparent;
        }
        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: #fff !important;
            border-bottom-color: rgba(255,255,255,0.6);
        }
        .dropdown-menu {
            background: var(--color-dd-bg);
            border: 1px solid var(--color-dd-bdr);
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            padding: 6px 0; min-width: 190px; margin-top: 0 !important;
        }
        .dropdown-item {
            font-size: 14px; color: var(--color-dd-item);
            padding: 9px 18px; display: flex; align-items: center; gap: 9px;
        }
        .dropdown-item:hover { background: var(--color-dd-hov); color: #1a6fa8; }
        .dropdown-divider { border-color: var(--color-divider); margin: 4px 0; }
        .navbar-toggler { border-color: rgba(255,255,255,0.3); }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        .nav-badge {
            font-size: 10px; background: #ff6b6b; color: #fff;
            border-radius: 10px; padding: 1px 6px; margin-left: 4px; font-weight: 600;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px; color: #fff;
            padding: 5px 14px; font-size: 13px; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            margin-left: 10px;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.25); }

        /* Stat cards */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--color-card-bdr);
            border-radius: 12px;
            padding: 20px 22px;
            box-shadow: 0 2px 10px rgba(26,111,168,0.07);
            display: flex; align-items: center; gap: 16px;
        }
        [data-theme="dark"] .stat-card { box-shadow: 0 2px 14px rgba(0,0,0,0.2); }
        .stat-icon {
            width: 52px; height: 52px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }
        .stat-icon.blue   { background: #dbeeff; color: #1a6fa8; }
        .stat-icon.green  { background: #d8f5e8; color: #1a9a5a; }
        .stat-icon.orange { background: #fff0dc; color: #c87800; }
        .stat-icon.red    { background: #fde8e8; color: #c0392b; }
        [data-theme="dark"] .stat-icon.blue   { background: #1a3a5c; color: #6ab8e8; }
        [data-theme="dark"] .stat-icon.green  { background: #1a3a2a; color: #4dc886; }
        [data-theme="dark"] .stat-icon.orange { background: #3a2e18; color: #f0a830; }
        [data-theme="dark"] .stat-icon.red    { background: #3a1a1a; color: #e07070; }
        .stat-value { font-size: 26px; font-weight: 700; line-height: 1; color: var(--color-text); }
        .stat-label { font-size: 12px; color: var(--color-sub); margin-top: 3px; }
        .stat-change { font-size: 11px; margin-top: 4px; }
        .stat-change.up   { color: #1a9a5a; }
        .stat-change.down { color: #c0392b; }

        /* Section title */
        .section-title {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #1a6fa8; margin-bottom: 14px;
        }
        [data-theme="dark"] .section-title { color: #5ab4dc; }

        /* Cards */
        .main-card {
            background: var(--bg-card);
            border: 1px solid var(--color-card-bdr);
            border-radius: 12px; padding: 1.5rem;
            box-shadow: 0 2px 10px rgba(26,111,168,0.07);
        }
        [data-theme="dark"] .main-card { box-shadow: 0 2px 16px rgba(0,0,0,0.22); }

        /* Quick actions */
        .quick-btn {
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; padding: 18px 10px; border-radius: 10px;
            background: #f0f8ff; border: 1px solid var(--color-card-bdr);
            color: #1a6fa8; font-size: 12px; font-weight: 600;
            text-decoration: none; text-align: center;
            transition: background 0.2s, transform 0.15s;
        }
        .quick-btn:hover { background: #dbeeff; transform: translateY(-2px); color: #1a6fa8; }
        [data-theme="dark"] .quick-btn { background: #1a3048; border-color: var(--color-border); color: #6ab8e8; }
        [data-theme="dark"] .quick-btn:hover { background: #1e3d5c; }
        .quick-btn svg { font-size: 22px; }

        /* Table */
        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
        .table-custom thead th {
            background: #f0f8ff; color: #1a6fa8;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; padding: 10px 14px; border-bottom: 1px solid var(--color-border);
        }
        [data-theme="dark"] .table-custom thead th { background: #1a3048; color: #6ab8e8; }
        .table-custom tbody td {
            padding: 11px 14px; border-bottom: 1px solid var(--color-divider);
            color: var(--color-text); vertical-align: middle;
        }
        .table-custom tbody tr:last-child td { border-bottom: none; }
        .table-custom tbody tr:hover td { background: #f4f9fd; }
        [data-theme="dark"] .table-custom tbody tr:hover td { background: #1a2e3e; }

        .badge-status {
            font-size: 11px; padding: 3px 10px; border-radius: 20px;
            font-weight: 600; display: inline-block;
        }
        .badge-active   { background: #d8f5e8; color: #1a7a50; }
        .badge-pending  { background: #fff0dc; color: #b07000; }
        .badge-inactive { background: #fde8e8; color: #b03030; }
        [data-theme="dark"] .badge-active   { background: #1a3a28; color: #4dc886; }
        [data-theme="dark"] .badge-pending  { background: #3a2e18; color: #f0a830; }
        [data-theme="dark"] .badge-inactive { background: #3a1a1a; color: #e07070; }

        .avatar-sm {
            width: 32px; height: 32px; border-radius: 8px;
            background: #dbeeff; color: #1a6fa8;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; margin-right: 8px; flex-shrink: 0;
        }
        [data-theme="dark"] .avatar-sm { background: #1a3a5c; color: #6ab8e8; }

        .page-title { font-size: 22px; font-weight: 700; color: var(--color-text); margin: 0; }
        .page-subtitle { font-size: 13px; color: var(--color-sub); margin: 2px 0 0; }

        /* Progress bar */
        .progress-slim { height: 6px; border-radius: 4px; background: var(--color-divider); overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; border-radius: 4px; background: #1a6fa8; }

        /* ===== ACCESS DENIED TOAST ===== */
        .toast-container-custom {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast-error {
            pointer-events: all;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid #f5c6c6;
            border-left: 4px solid #c0392b;
            border-radius: 12px;
            padding: 14px 16px;
            min-width: 300px;
            max-width: 380px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.13);
            animation: slideInRight 0.35s cubic-bezier(.22,.68,0,1.2) both;
        }
        [data-theme="dark"] .toast-error {
            border-color: #5a2a2a;
            border-left-color: #e07070;
            box-shadow: 0 8px 28px rgba(0,0,0,0.4);
        }
        .toast-error.hiding {
            animation: slideOutRight 0.3s ease forwards;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(60px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideOutRight {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(60px); }
        }
        .toast-icon {
            width: 36px; height: 36px; border-radius: 9px;
            background: #fde8e8; color: #c0392b;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        [data-theme="dark"] .toast-icon { background: #3a1a1a; color: #e07070; }
        .toast-title {
            font-size: 14px; font-weight: 700;
            color: var(--color-text); margin: 0 0 2px;
        }
        .toast-msg {
            font-size: 12px; color: var(--color-sub); margin: 0;
        }
        .toast-close {
            margin-left: auto; background: none; border: none;
            color: var(--color-sub); font-size: 18px; cursor: pointer;
            padding: 0; line-height: 1; flex-shrink: 0;
            opacity: 0.6;
        }
        .toast-close:hover { opacity: 1; }
        .toast-progress {
            position: absolute;
            bottom: 0; left: 4px;
            height: 3px; border-radius: 0 0 0 8px;
            background: #c0392b;
            animation: shrink 5s linear forwards;
        }
        [data-theme="dark"] .toast-progress { background: #e07070; }
        @keyframes shrink {
            from { width: calc(100% - 8px); }
            to   { width: 0; }
        }
        /* ===== END TOAST ===== */
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Date
    const d = new Date();
    document.getElementById('currentDate').textContent =
        d.toLocaleDateString('uz-UZ', { year:'numeric', month:'long', day:'numeric' });

    // Theme
    const html = document.documentElement;
    const saved = localStorage.getItem('mb-theme') || 'light';
    applyTheme(saved);

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('mb-theme', theme);
        document.getElementById('themeIcon').textContent  = theme === 'dark' ? '☀️' : '🌙';
        document.getElementById('themeLabel').textContent = theme === 'dark' ? 'Kun'  : 'Tun';
    }
    function toggleTheme() {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    /* ===== TOAST SYSTEM ===== */
    function showToast(title, msg, autoMs) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast-error';
        toast.style.position = 'relative';
        toast.innerHTML =
            '<div class="toast-icon">🔒</div>' +
            '<div style="flex:1; min-width:0;">' +
            '<p class="toast-title">' + title + '</p>' +
            '<p class="toast-msg">' + msg + '</p>' +
            '</div>' +
            '<button class="toast-close" onclick="closeToast(this.closest(\'.toast-error\'))">×</button>' +
            '<div class="toast-progress" style="animation-duration:' + (autoMs/1000) + 's"></div>';
        container.appendChild(toast);

        setTimeout(function() { closeToast(toast); }, autoMs);
    }

    function closeToast(toast) {
        if (!toast || toast.classList.contains('hiding')) return;
        toast.classList.add('hiding');
        setTimeout(function() { toast.remove(); }, 300);
    }

    /* URL parametrni tekshirish */
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'access_denied') {
        showToast('Ruxsat yo\'q! 🚫', 'Siz kirmoqchi bo\'lgan sahifaga kirishga ruxsat berilmagan.', 5000);
        /* URLdan parametrni tozalash (sahifa reload bo'lmaydi) */
        const cleanUrl = window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
    }
    /* ===== END TOAST ===== */
</script>
