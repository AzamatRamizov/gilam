<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mijozlar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        :root {
            --bg-body:       #dceef8;
            --bg-card:       #ffffff;
            --bg-sidebar:    #1a6fa8;
            --color-text:    #1a3a52;
            --color-sub:     #5a8fa8;
            --color-border:  #b3d6ee;
            --color-divider: #d0e9f5;
            --color-card-bdr:#c5dff0;
            --color-dd-bg:   #ffffff;
            --color-dd-hov:  #e8f4fd;
            --color-dd-bdr:  #c5dff0;
            --color-dd-item: #1a3a52;
            --color-hint:    #90b8cc;
            --bg-input:      #f5fafd;
            --transition: 0.25s ease;
        }
        [data-theme="dark"] {
            --bg-body:       #0f1e2b;
            --bg-card:       #162534;
            --bg-sidebar:    #0e3f60;
            --color-text:    #d0e8f5;
            --color-sub:     #5a8fa8;
            --color-border:  #2a4f6a;
            --color-divider: #1e3d55;
            --color-card-bdr:#1e3d55;
            --color-dd-bg:   #162534;
            --color-dd-hov:  #1c3448;
            --color-dd-bdr:  #2a4f6a;
            --color-dd-item: #c0ddf0;
            --color-hint:    #4a7a94;
            --bg-input:      #1c2f40;
        }
        * { box-sizing: border-box; transition: background-color var(--transition), color var(--transition), border-color var(--transition); }
        body { background-color: var(--bg-body); font-family: 'Segoe UI', sans-serif; color: var(--color-text); min-height: 100vh; }

        /* Navbar */
        .navbar { background: #1a6fa8 !important; box-shadow: 0 2px 10px rgba(26,111,168,0.3); padding: 0; }
        [data-theme="dark"] .navbar { background: #0e3f60 !important; }
        .navbar-brand { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #fff !important; letter-spacing: -0.3px; }
        .navbar-brand .logo-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.18); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .navbar-brand span { color: #a8dcf5; }
        .navbar-nav .nav-link { color: rgba(255,255,255,0.88) !important; font-size: 14px; font-weight: 500; padding: 20px 14px !important; border-bottom: 2px solid transparent; }
        .navbar-nav .nav-link:hover, .navbar-nav .nav-link.active { color: #fff !important; border-bottom-color: rgba(255,255,255,0.6); }
        .dropdown-menu { background: var(--color-dd-bg); border: 1px solid var(--color-dd-bdr); border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.12); padding: 6px 0; min-width: 190px; margin-top: 0 !important; }
        .dropdown-item { font-size: 14px; color: var(--color-dd-item); padding: 9px 18px; display: flex; align-items: center; gap: 9px; }
        .dropdown-item:hover { background: var(--color-dd-hov); color: #1a6fa8; }
        .dropdown-divider { border-color: var(--color-divider); margin: 4px 0; }
        .navbar-toggler { border-color: rgba(255,255,255,0.3); }
        .navbar-toggler-icon { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e"); }
        .nav-badge { font-size: 10px; background: #ff6b6b; color: #fff; border-radius: 10px; padding: 1px 6px; margin-left: 4px; font-weight: 600; }
        .theme-toggle { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; color: #fff; padding: 5px 14px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-left: 10px; }
        .theme-toggle:hover { background: rgba(255,255,255,0.25); }

        /* Stat cards */
        .stat-card { background: var(--bg-card); border: 1px solid var(--color-card-bdr); border-radius: 12px; padding: 20px 22px; box-shadow: 0 2px 10px rgba(26,111,168,0.07); display: flex; align-items: center; gap: 16px; }
        [data-theme="dark"] .stat-card { box-shadow: 0 2px 14px rgba(0,0,0,0.2); }
        .stat-icon { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .stat-icon.blue   { background: #dbeeff; color: #1a6fa8; }
        .stat-icon.green  { background: #d8f5e8; color: #1a9a5a; }
        .stat-icon.purple { background: #e8ddfb; color: #6b3fc8; }
        .stat-icon.orange { background: #fff0dc; color: #c87800; }
        [data-theme="dark"] .stat-icon.blue   { background: #1a3a5c; color: #6ab8e8; }
        [data-theme="dark"] .stat-icon.green  { background: #1a3a2a; color: #4dc886; }
        [data-theme="dark"] .stat-icon.purple { background: #2e2350; color: #a886e8; }
        [data-theme="dark"] .stat-icon.orange { background: #3a2e18; color: #f0a830; }
        .stat-value { font-size: 26px; font-weight: 700; line-height: 1; color: var(--color-text); }
        .stat-label { font-size: 12px; color: var(--color-sub); margin-top: 3px; }

        .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #1a6fa8; margin-bottom: 14px; }
        [data-theme="dark"] .section-title { color: #5ab4dc; }

        .main-card { background: var(--bg-card); border: 1px solid var(--color-card-bdr); border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 10px rgba(26,111,168,0.07); }
        [data-theme="dark"] .main-card { box-shadow: 0 2px 16px rgba(0,0,0,0.22); }

        .page-title { font-size: 22px; font-weight: 700; color: var(--color-text); margin: 0; }
        .page-subtitle { font-size: 13px; color: var(--color-sub); margin: 2px 0 0; }

        /* Toolbar */
        .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:1.1rem; }
        .search-box { position:relative; flex:1; min-width:220px; }
        .search-box input { width:100%; background:#f0f8ff; border:1px solid var(--color-border); border-radius:8px; padding:9px 12px 9px 36px; font-size:14px; color:var(--color-text); outline:none; }
        [data-theme="dark"] .search-box input { background:#1a3048; }
        .search-box input:focus { border-color:#1a6fa8; box-shadow:0 0 0 3px rgba(26,111,168,0.12); }
        .search-box input::placeholder { color: var(--color-hint); }
        .search-box svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--color-sub); }
        .filter-select { background:#f0f8ff; border:1px solid var(--color-border); border-radius:8px; padding:9px 12px; font-size:14px; color:var(--color-text); outline:none; }
        [data-theme="dark"] .filter-select { background:#1a3048; }
        .filter-select:focus { border-color:#1a6fa8; }
        .btn-add { background:#1a6fa8; color:#fff; border:none; border-radius:8px; padding:9px 18px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; cursor:pointer; white-space:nowrap; text-decoration:none; }
        .btn-add:hover { background:#155d8e; color:#fff; }

        /* Table */
        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
        .table-custom thead th { background: #f0f8ff; color: #1a6fa8; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 14px; border-bottom: 1px solid var(--color-border); white-space: nowrap; cursor: pointer; user-select: none; }
        [data-theme="dark"] .table-custom thead th { background: #1a3048; color: #6ab8e8; }
        .table-custom thead th:hover { opacity: 0.75; }
        .table-custom thead th .sort-icon { margin-left:4px; opacity:.5; font-size:10px; }
        .table-custom tbody td { padding: 11px 14px; border-bottom: 1px solid var(--color-divider); color: var(--color-text); vertical-align: middle; }
        .table-custom tbody tr:last-child td { border-bottom: none; }
        .table-custom tbody tr:hover td { background: #f4f9fd; }
        [data-theme="dark"] .table-custom tbody tr:hover td { background: #1a2e3e; }

        .region-badge { background:#dbeeff; color:#1a6fa8; font-size:11px; padding:3px 10px; border-radius:20px; white-space:nowrap; font-weight:500; }
        [data-theme="dark"] .region-badge { background:#1a3a5c; color:#6ab8e8; }

        .passport-chip { background:#fff0dc; color:#b07000; font-size:12px; padding:3px 9px; border-radius:6px; font-family: monospace; font-weight:600; letter-spacing:0.5px; }
        [data-theme="dark"] .passport-chip { background:#3a2e18; color:#f0a830; }

        .avatar-sm { width: 32px; height: 32px; border-radius: 8px; background: #dbeeff; color: #1a6fa8; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; margin-right: 8px; flex-shrink: 0; }
        [data-theme="dark"] .avatar-sm { background: #1a3a5c; color: #6ab8e8; }

        .action-link { font-size:12px; text-decoration:none; font-weight:600; margin-right:10px; cursor:pointer; }
        .action-link.view { color:#1a6fa8; }
        .action-link.edit { color:#1a9a5a; }
        .action-link.del  { color:#c0392b; }

        .pagination-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-top:1.1rem; }
        .page-info { font-size:13px; color:var(--color-sub); }
        .page-btns { display:flex; gap:4px; }
        .page-btn { background:#f0f8ff; border:1px solid var(--color-border); border-radius:6px; padding:5px 12px; font-size:13px; color:var(--color-text); cursor:pointer; }
        [data-theme="dark"] .page-btn { background:#1a3048; }
        .page-btn:hover { border-color:#1a6fa8; color:#1a6fa8; }
        .page-btn.active { background:#1a6fa8; border-color:#1a6fa8; color:#fff; }
        .page-btn:disabled { opacity:0.4; cursor:default; }

        .empty-state { text-align:center; padding:3rem 1rem; color:var(--color-sub); }
        .empty-state svg { opacity:.35; margin-bottom:10px; }

        /* Form styles */
        .form-label { font-size: 13px; color: var(--color-sub); margin-bottom: 5px; font-weight: 500; }
        .form-control, .form-select { font-size: 14px; border: 1px solid var(--color-border); border-radius: 8px; padding: 9px 12px; color: var(--color-text); background-color: var(--bg-input); }
        .form-control:focus, .form-select:focus { border-color: #1a6fa8; box-shadow: 0 0 0 3px rgba(26,111,168,0.14); background-color: var(--bg-card); color: var(--color-text); }
        .form-control::placeholder { color: var(--color-hint); }
        .form-select option { background: var(--bg-card); color: var(--color-text); }
        .required-star { color: #e05555; margin-left: 2px; }

        /* Modal */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center; padding: 16px; overflow-y:auto; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:var(--bg-card); border-radius:14px; padding:1.8rem; max-width:480px; width:100%; box-shadow:0 8px 40px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .modal-box.modal-sm { max-width: 400px; }
        .modal-title { font-size:17px; font-weight:700; color:var(--color-text); margin:0 0 1.2rem; display:flex; align-items:center; gap:8px; }
        .modal-field { margin-bottom:9px; font-size:14px; color:var(--color-text); }
        .modal-field span { color:var(--color-sub); font-size:11px; display:block; margin-bottom:2px; text-transform:uppercase; letter-spacing:.05em; }
        .modal-close { background:#f0f8ff; border:1px solid var(--color-border); border-radius:8px; padding:8px 20px; font-size:13px; color:var(--color-text); cursor:pointer; margin-top:.5rem; }
        [data-theme="dark"] .modal-close { background:#1a3048; }
        .btn-save-form { background:#1a6fa8; color:#fff; border:none; border-radius:8px; padding:9px 22px; font-size:14px; font-weight:600; cursor:pointer; }
        .btn-save-form:hover { background:#155d8e; }
        .btn-cancel-form { background:var(--bg-input); color:var(--color-text); border:1px solid var(--color-border); border-radius:8px; padding:9px 18px; font-size:14px; cursor:pointer; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragment :: navbar}"></nav>
<!-- Main -->
<div class="container-fluid px-4 py-4">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
            <p class="page-title">🧑‍🤝‍🧑 Mijozlar</p>
            <p class="page-subtitle">Tizimga ro'yxatdan o'tgan barcha mijozlar</p>
        </div>
        <a href="/admin/user-add" class="btn-add">➕ Yangi mijoz qo'shish</a>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4" id="statsRow"></div>

    <!-- Table card -->
    <div class="main-card">

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.598 1.04a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Ism, familiya, telefon yoki passport..." oninput="renderTable()">
            </div>
            <select class="filter-select" id="tumanFilter" onchange="renderTable()">
                <option value="">Barcha tuman</option>
                <option>Chilonzor</option>
                <option>Yunusobod</option>
                <option>Mirzo Ulug'bek</option>
                <option>Shayxontohur</option>
                <option>Yakkasaroy</option>
                <option>Sergeli</option>
                <option>Uchtepa</option>
                <option>Bektemir</option>
            </select>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table-custom" id="custTable">
                <thead>
                <tr>
                    <th onclick="sortBy('id')">#<span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('fio')">F.I.Sh<span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('tel')">Telefon<span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('tuman')">Tuman<span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('manzil')">Manzil<span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('passport')">Passport<span class="sort-icon">↕</span></th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8Zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002-.014.002H7.022ZM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816ZM4.92 10A5.493 5.493 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275ZM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0Zm3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/>
                </svg>
                <p style="margin-top:8px;font-size:14px;">Mijoz topilmadi</p>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination-row">
            <div class="page-info" id="pageInfo"></div>
            <div class="page-btns" id="pageBtns"></div>
        </div>
    </div>
</div>

<!-- View Modal -->
<div class="modal-overlay" id="viewModal" onclick="closeModal('viewModal')">
    <div class="modal-box modal-sm" onclick="event.stopPropagation()">
        <p class="modal-title">🧑 Mijoz ma'lumotlari</p>
        <div id="modalContent"></div>
        <button class="modal-close" onclick="closeModal('viewModal')">Yopish</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Theme ──
    const html = document.documentElement;
    applyTheme(localStorage.getItem('mb-theme') || 'light');
    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('mb-theme', theme);
        document.getElementById('themeIcon').textContent  = theme === 'dark' ? '☀️' : '🌙';
        document.getElementById('themeLabel').textContent = theme === 'dark' ? 'Kun'  : 'Tun';
    }
    function toggleTheme() {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // ── Model: matches backend fields exactly ──
    // ism, familiya, sharif, tuman, manzil, tel, passport
    const AVATAR_COLORS = [
        {bg:'#dbeeff', c:'#1a6fa8'}, {bg:'#d8f5e8', c:'#1a7a50'}, {bg:'#fff0dc', c:'#b07000'},
        {bg:'#e8ddfb', c:'#6b3fc8'}, {bg:'#ffe4ef', c:'#c8447a'}, {bg:'#dcf7f0', c:'#0f9b8e'}
    ];

    // let customers = [
    //     { id:1, ism:"Alisher", familiya:"Karimov", sharif:"Bahodir o'g'li", tuman:"Chilonzor", manzil:"Bunyodkor ko'ch. 12", tel:"+998 90 123 45 67", passport:"AB1234567" },
    //     { id:2, ism:"Malika", familiya:"Yusupova", sharif:"Sardor qizi", tuman:"Yunusobod", manzil:"Amir Temur ko'ch. 8", tel:"+998 91 234 56 78", passport:"AC2345678" },
    //     { id:3, ism:"Bobur", familiya:"Toshmatov", sharif:"Jamshid o'g'li", tuman:"Mirzo Ulug'bek", manzil:"Buyuk Ipak Yo'li 34", tel:"+998 93 345 67 89", passport:"AD3456789" },
    //     { id:4, ism:"Zulfiya", familiya:"Norova", sharif:"Ulug'bek qizi", tuman:"Shayxontohur", manzil:"Navoiy ko'ch. 5", tel:"+998 94 456 78 90", passport:"AE4567890" },
    //     { id:5, ism:"Sardor", familiya:"Raxmatullayev", sharif:"Nodir o'g'li", tuman:"Yakkasaroy", manzil:"Mustaqillik ko'ch. 21", tel:"+998 97 567 89 01", passport:"AF5678901" },
    // ];

    let customers = [];
    let nextId = 6;

    function rndColor(i){ return AVATAR_COLORS[i % AVATAR_COLORS.length]; }
    function fullName(c){ return `${c.familiya} ${c.ism} ${c.sharif||''}`.trim(); }
    function initialsOf(c){ return (c.ism?.[0]||'') + (c.familiya?.[0]||''); }

    // ── State ──
    let sortCol='id', sortDir=1, page=1;
    const PER_PAGE = 10;

    // ── Stats ──
    function renderStats(){
        const total = customers.length;
        const tumanSet = new Set(customers.map(c=>c.tuman).filter(Boolean));
        const withPassport = customers.filter(c=>c.passport).length;
        const todayCount = customers.length ? Math.min(3, customers.length) : 0;
        document.getElementById('statsRow').innerHTML = `
            <div class="col-sm-6 col-xl-3">
              <div class="stat-card">
                <div class="stat-icon blue">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16"><path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002-.014.002H7.022zM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816zM4.92 10A5.493 5.493 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275zM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0zm3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
                </div>
                <div><div class="stat-value">${total}</div><div class="stat-label">Jami mijozlar</div></div>
              </div>
            </div>
            <div class="col-sm-6 col-xl-3">
              <div class="stat-card">
                <div class="stat-icon purple">

    // ── Filter + sort ──
    function getFiltered(){
        const q = document.getElementById('searchInput').value.toLowerCase();
        const tm = document.getElementById('tumanFilter').value;
        return customers.filter(c=>{
            const blob = `${fullName(c)} ${c.tel} ${c.passport}`.toLowerCase();
            return (!q||blob.includes(q)) && (!tm||c.tuman===tm);
        }).sort((a,b)=>{
            let va,vb;
            if(sortCol==='fio'){ va=a.familiya; vb=b.familiya; }
            else if(sortCol==='id'){ va=a.id; vb=b.id; }
            else { va=a[sortCol]; vb=b[sortCol]; }
            return va<vb ? -sortDir : va>vb ? sortDir : 0;
        });
    }

    function sortBy(col){
        if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
        page=1; renderTable();
    }

    // ── Render table ──
    function renderTable(){
        const data = getFiltered();
        const total = data.length;
        const pages = Math.ceil(total/PER_PAGE) || 1;
        if(page>pages) page=1;
        const slice = data.slice((page-1)*PER_PAGE, page*PER_PAGE);

        const cols=['id','fio','tel','tuman','manzil','passport'];
        document.querySelectorAll('.table-custom thead th').forEach((th,i)=>{
            const sp = th.querySelector('.sort-icon');
            if(!sp) return;
            sp.textContent = (cols[i]===sortCol) ? (sortDir===1?'↑':'↓') : '↕';
        });

        const tbody = document.getElementById('tableBody');
        const empty = document.getElementById('emptyState');

        if(!slice.length){
            tbody.innerHTML=''; empty.style.display='block';
        } else {
            empty.style.display='none';
            tbody.innerHTML = slice.map(c=>{
                const ac = rndColor(c.id);
                return `
                <tr>
                    <td style="color:var(--color-sub);">${c.id}</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar-sm" style="background:${ac.bg};color:${ac.c}">${initialsOf(c)}</div>
                            <div>
                                <div style="font-weight:600;">${fullName(c)}</div>
                            </div>
                        </div>
                    </td>
                    <td>${c.tel}</td>
                    <td>${c.tuman ? `<span class="region-badge">${c.tuman}</span>` : '<span style="color:var(--color-hint)">—</span>'}</td>
                    <td>${c.manzil || '<span style="color:var(--color-hint)">—</span>'}</td>
                    <td><span class="passport-chip">${c.passport}</span></td>
                    <td style="white-space:nowrap;">
                        <a class="action-link view" onclick="viewCustomer(${c.id})">Batafsil</a>
                    </td>
                </tr>`;
            }).join('');
        }

        const from=(page-1)*PER_PAGE+1, to=Math.min(page*PER_PAGE,total);
        document.getElementById('pageInfo').textContent = total ? `${from}–${to} / jami ${total} ta` : '0 ta natija';

        const pb = document.getElementById('pageBtns');
        let btns = `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
        for(let p2=1;p2<=pages;p2++){
            if(pages<=7||p2===1||p2===pages||Math.abs(p2-page)<=1){
                btns+=`<button class="page-btn ${p2===page?'active':''}" onclick="goPage(${p2})">${p2}</button>`;
            } else if(Math.abs(p2-page)===2){
                btns+=`<button class="page-btn" disabled>…</button>`;
            }
        }
        btns+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>›</button>`;
        pb.innerHTML=btns;
    }

    function goPage(p){ page=p; renderTable(); window.scrollTo(0,0); }

    // ── View ──
    function viewCustomer(id){
        const c = customers.find(x=>x.id===id);
        const ac = rndColor(c.id);
        document.getElementById('modalContent').innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;">
                <div class="avatar-sm" style="width:48px;height:48px;font-size:17px;background:${ac.bg};color:${ac.c}">${initialsOf(c)}</div>
                <div>
                    <p style="font-size:15px;font-weight:700;margin:0;color:var(--color-text)">${fullName(c)}</p>
                    <span class="passport-chip">${c.passport}</span>
                </div>
            </div>
            <div class="modal-field"><span>Telefon</span>${c.tel}</div>
            <div class="modal-field"><span>Tuman</span>${c.tuman || '—'}</div>
            <div class="modal-field"><span>Manzil</span>${c.manzil || '—'}</div>
        `;
        document.getElementById('viewModal').classList.add('show');
    }
